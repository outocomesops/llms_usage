<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LLM Usage Tracker{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .kpi-card { border: none; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .kpi-value { font-size: 2rem; font-weight: 700; }
    .kpi-label { font-size: .8rem; text-transform: uppercase; letter-spacing: .05em; color: #6c757d; }
    .chart-container { position: relative; height: 300px; }
    .table th { font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; color: #6c757d; }
    .badge-model { font-size: .75rem; background: #e9ecef; color: #495057; border-radius: 6px; padding: 2px 8px; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">&#127760; LLM Usage</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="/">Overview</a></li>
          <li class="nav-item"><a class="nav-link" href="/models">Models</a></li>
          <li class="nav-item"><a class="nav-link" href="/requests">Requests</a></li>
          <li class="nav-item"><a class="nav-link" href="/costs">Costs</a></li>
          <li class="nav-item"><a class="nav-link" href="/evaluations">Evaluations</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
